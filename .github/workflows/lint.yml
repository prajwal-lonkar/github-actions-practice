# What is your goal for your workflow
# Whenever someone changes python code linter will check if syntax, format , indentation is correct or not

name: Auto Linter

on: 
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
    # This step will automatically clone the code of current branch into the runner 
      - name: Checkout/clone the code
        uses: actions/checkout@v7

      # This step will install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
   
      # this step will install the linting tool
      - name: Install Linter
        run: pip install ruff

      # This step will run the linter
      - name: Check files for linting
        run: ruff check .
